port: 7880
bind_addresses:
  - ""
rtc:
  tcp_port: 7881
  port_range_start: 50000
  port_range_end: 60000
  use_external_ip: false

keys:
  # MUST MATCH the LIVEKIT_API_KEY and LIVEKIT_API_SECRET in your backend .env
  # Default development keys (CHANGE THESE BEFORE PRODUCTION)
  devkey: secretkey

logging:
  json: false
  level: info

# redis is required for multi-node deployments and state management
redis:
  address: redis:6379
