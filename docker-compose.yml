services:
  db:
    image: postgres:latest
    container_name: meetdewan_db
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-meetdewan_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-meetdewan_pass}
      POSTGRES_DB: ${DB_NAME:-meetdewan_db}
    volumes:
      - postgres_data:/var/lib/postgresql
    networks:
      - meetdewan_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-meetdewan_user} -d ${DB_NAME:-meetdewan_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: meetdewan_backend
    restart: always
    environment:
      DATABASE_URL: postgresql://${DB_USER:-meetdewan_user}:${DB_PASSWORD:-meetdewan_pass}@db:5432/${DB_NAME:-meetdewan_db}?schema=public
      FRONTEND_URL: https://ketemudewan.perdinkeuangan.online
      PORT: 5000
      LIVEKIT_API_KEY: ${LIVEKIT_API_KEY}
      LIVEKIT_API_SECRET: ${LIVEKIT_API_SECRET}
    ports:
      - "5001:5000"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - meetdewan_net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_BACKEND_URL: https://ketemudewan.perdinkeuangan.online
        NEXT_PUBLIC_LIVEKIT_URL: wss://meetdewan-v0apc9cj.livekit.cloud
    container_name: meetdewan_frontend
    restart: always
    environment:
      NEXT_PUBLIC_BACKEND_URL: https://ketemudewan.perdinkeuangan.online
      NEXT_PUBLIC_LIVEKIT_URL: wss://meetdewan-v0apc9cj.livekit.cloud
      PORT: 3000
    ports:
      - "3001:3000"
    depends_on:
      - backend
      - livekit
    networks:
      - meetdewan_net

  livekit:
    image: livekit/livekit-server:latest
    container_name: meetdewan_livekit
    restart: always
    command: --config /etc/livekit.yaml
    volumes:
      - ./livekit/livekit.yaml:/etc/livekit.yaml:ro
    ports:
      - "7880:7880" # HTTP/WS signaling
      - "7881:7881" # WebRTC over TCP
      - "7882:7882/udp" # WebRTC over UDP (optional custom)
      - "50000-60000:50000-60000/udp" # UDP media range
    environment:
      LIVEKIT_KEYS: "${LIVEKIT_API_KEY}: ${LIVEKIT_API_SECRET}"
    depends_on:
      - redis
    networks:
      - meetdewan_net

  redis:
    image: redis:7-alpine
    container_name: meetdewan_redis
    restart: always
    networks:
      - meetdewan_net

# Coturn is no longer needed as LiveKit handles TURN natively
#  coturn:
#    image: coturn/coturn:latest
#    container_name: meetdewan_turn
#    restart: always
#    network_mode: host
#    volumes:
#      - ./coturn/turnserver.conf:/etc/coturn/turnserver.conf:ro

networks:
  meetdewan_net:
    driver: bridge

volumes:
  postgres_data:
